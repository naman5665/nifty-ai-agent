name: Run Daily AI Market Agent

on:
  schedule:
    # GitHub Actions free-tier cron can be delayed 1-3+ hours during peak load.
    # NSE closes at 3:30 PM IST = 10:00 UTC. We schedule at 8:30 UTC (2:00 PM IST)
    # so that even with a ~2h GitHub queue delay the job runs after market close.
    # If GitHub runs it immediately at 8:30 UTC the price will be intraday (not EOD);
    # with the typical 1-3h delay it lands between 10:30-11:30 UTC = 4-5 PM IST.
    - cron: '30 8 * * 1-5'
  workflow_dispatch: # This adds a manual "Run" button inside GitHub to test it anytime!

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project code
        uses: actions/checkout@v4

      - name: Setup Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Grant execution permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Build and execute Kotlin Agent application
        env:
          # Injects your hidden GitHub secrets directly into your Kotlin environment variables
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: ./gradlew run